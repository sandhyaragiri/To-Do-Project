<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashBoard</title>
   <link rel="stylesheet" href="./pages/CSS/dashboard.css">
   <script src="./pages/CSS/JAVASCRIPT/dashboard.js" defer></script>
</head>
<body>

<header class="header"> 
    <h1 class="logo">TaskFlow ✔</h1> 
</header> 

<!--Cards here goes-->
<main class="dashboard">

    <div class="card" id="taskflow">
        <h2>✔Tasks</h2>
        <p>Manage your tasks</p>
    </div>

    <div class="card" id="timer">
        <h2>⏰ Timer</h2>
        <p>Focus sessions</p>
    </div>

    <div class="card" id="notes">
        <h2>📝 Notes</h2>
        <p>Quick notes</p>
    </div>

    <div class="card" id="settings">
        <h2>⚙️ Settings</h2>
        <p>Customize app</p>
    </div>
    
</main>
</body>
</html>
