<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="./CSS/settings.css">
    <script src="./CSS/JAVASCRIPT/settings.js" defer></script>
</head>
<body>
   <div class="settings">
    <h2>⚙️ Settings</h2>
</div>

<div class="settings-modal hidden">
    <h2>Settings</h2>

    <label>Theme</label>
    <select>
        <option>Light</option>
        <option>Dark</option>
    </select>

    <label>Font Size</label>
    <select>
        <option>Small</option>
        <option>Medium</option>
        <option>Large</option>
    </select>

    <button class="close-btn">Close</button>
</div>
</body>
</html>
